<script>
    fetch('./static/links.txt')
        .then(response => response.text())
        .then(text => {
            const lines = text.split('\n');
            const links = [];
            let current = {};
            for (const line of lines) {
                const trimmed = line.trim();
                if (trimmed.startsWith('title:')) {
                    current.title = trimmed.substring(6).trim();
                } else if (trimmed.startsWith('url:')) {
                    current.url = trimmed.substring(4).trim();
                } else if (trimmed.startsWith('qrcode:')) {
                    current.qrcode = trimmed.substring(7).trim();
                }
                if (current.title && (current.url || current.qrcode)) {
                    links.push(current);
                    current = {};
                }
            }
            const container = document.getElementById('links');
            const p = document.createElement('p');
            for (let i = 0; i < links.length; i++) {
                if (i > 0) {
                    p.appendChild(document.createTextNode(' | '));
                }
                const a = document.createElement('a');
                a.textContent = links[i].title;
                if (links[i].qrcode) {
                    a.href = 'javascript:void(0)';
                    a.addEventListener('click', function () {
                        document.getElementById('qrcodeImg').src = links[i].qrcode;
                        document.getElementById('qrcodeModal').classList.add('active');
                    });
                } else {
                    a.href = links[i].url;
                    a.target = '_blank';
                }
                p.appendChild(a);
            }
            container.appendChild(p);
        });

    document.getElementById('modalClose').addEventListener('click', function () {
        document.getElementById('qrcodeModal').classList.remove('active');
    });
    document.getElementById('qrcodeModal').addEventListener('click', function (e) {
        if (e.target === this) {
            this.classList.remove('active');
        }
    });
</script>
